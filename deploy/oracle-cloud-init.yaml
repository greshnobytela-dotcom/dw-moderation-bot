#cloud-config
package_update: true
packages:
  - python3
  - python3-venv
  - python3-pip
  - git
  - rsync

write_files:
  - path: /opt/discord-server-manager/.env
    permissions: "0600"
    content: |
      DISCORD_BOT_TOKEN=PASTE_TOKEN_HERE
      DISCORD_GUILD_ID=1500480346540474490

runcmd:
  - mkdir -p /opt/discord-server-manager
  - chown -R ubuntu:ubuntu /opt/discord-server-manager
  - echo "Скопируй проект: ./deploy/upload-to-vps.sh ubuntu@PUBLIC_IP"
  - echo "Затем: sudo bash /opt/discord-server-manager/deploy/install-vps.sh"
